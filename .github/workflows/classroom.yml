      # Consolidador Final do Relatório CSV
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          N5_RESULTS: "${{ steps.n5.outputs.result }}"
          N10_RESULTS: "${{ steps.n10.outputs.result }}"
          N15_RESULTS: "${{ steps.n15.outputs.result }}"
          N20_RESULTS: "${{ steps.n20.outputs.result }}"
          N25_RESULTS: "${{ steps.n25.outputs.result }}"
          N30_RESULTS: "${{ steps.n30.outputs.result }}"
          N35_RESULTS: "${{ steps.n35.outputs.result }}"
          N40_RESULTS: "${{ steps.n40.outputs.result }}"
          N45_RESULTS:  ${{ steps.n45.outputs.result }}"
          N50_RESULTS: "${{ steps.n50.outputs.result }}"
          N55_RESULTS: "${{ steps.n55.outputs.result }}"
          N60_RESULTS: "${{ steps.n60.outputs.result }}"
          N65_RESULTS: "${{ steps.n65.outputs.result }}"
          N70_RESULTS: "${{ steps.n70.outputs.result }}"
          N75_RESULTS: "${{ steps.n75.outputs.result }}"
          N80_RESULTS: "${{ steps.n80.outputs.result }}"
          N85_RESULTS: "${{ steps.n85.outputs.result }}"
          N90_RESULTS: "${{ steps.n90.outputs.result }}"
          N95_RESULTS: "${{ steps.n95.outputs.result }}"
          N100_RESULTS: "${{ steps.n100.outputs.result }}"
        with:
          runners: n5,n10,n15,n20,n25,n30,n35,n40,n45,n50,n55,n60,n65,n70,n75,n80,n85,n90,n95,n100
