name: GitHub Classroom Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bloco de Testes Individuais (5 a 100)
      - name: n5
        id: n5
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: n5
          command: NOTA=$(cat .github/workflows/grade.txt | tr -d '[:space:]'); if [ "$NOTA" -ge 5 ]; then exit 0; else exit 1; fi
          timeout: 2
          max-score: 5

      - name: n10
        id: n10
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: n10
          command: NOTA=$(cat .github/workflows/grade.txt | tr -d '[:space:]'); if [ "$NOTA" -ge 10 ]; then exit 0; else exit 1; fi
